<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-right">
            <div class="login-card fade-in">
                <h2>College Management Portal</h2>
                <p style="color:rgba(255,255,255,0.7);">Please sign in to access your dashboard.</p>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" class="form-input" placeholder="e.g. student1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
            </div>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen">
        <aside class="sidebar">
            <div class="brand">🎓 <span>UniPortal</span></div>
            <div id="nav-menu"></div>
            <div class="logout-btn" onclick="logout()">Sign Out</div>
        </aside>

        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-title" id="page-title">Dashboard</div>
                <div class="user-profile">
                    <div class="user-info" style="text-align: right;">
                        <small id="user-role-display">Role</small>
                        <strong id="user-name-display">Name</strong>
                    </div>
                    <div class="avatar" id="user-avatar">U</div>
                </div>
            </header>
            <main class="content-area" id="main-content"></main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
